<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Live GPS Location</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin: 0; padding: 0; }
    #map { height: 100vh; width: 100%; }
    #status {
      position: fixed; top: 10px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: white;
      padding: 6px 14px; border-radius: 20px;
      font-family: sans-serif; font-size: 13px;
      z-index: 9999; white-space: nowrap;
    }
    #debug {
      position: fixed; bottom: 10px; left: 10px;
      background: rgba(0,0,0,0.6); color: #ccc;
      padding: 6px 10px; border-radius: 8px;
      font-family: monospace; font-size: 11px;
      z-index: 9999; max-width: 90vw;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="status">Loading last known location...</div>
  <div id="debug">Waiting...</div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const NTFY_TOPIC = "chaoistaoist-loco";
    const MAPTILER_KEY = "ZF5oLIMxNLb2Ao8GRUQI";

    const map = L.map('map').setView([43.997, -76.189], 15);

    L.tileLayer(
      `https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`,
      {
        attribution: '© <a href="https://www.maptiler.com/copyright/">MapTiler</a> © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        tileSize: 512,
        zoomOffset: -1,
        maxZoom: 20
      }
    ).addTo(map);

    let marker = null;

    function debug(msg) {
      document.getElementById('debug').textContent = msg;
      console.log('[GPS]', msg);
    }

    function parseCoordsFromMessage(msg) {
      if (!msg) return null;

      let m = msg.match(/[?&](?:q|pin|ll)=([-\d.]+),([-\d.]+)/);
      if (m) return { lat: parseFloat(m[1]), lon: parseFloat(m[2]) };

      m = msg.match(/geo:([-\d.]+),([-\d.]+)/);
      if (m) return { lat: parseFloat(m[1]), lon: parseFloat(m[2]) };

      m = msg.match(/lat(?:itude)?=([-\d.]+).*?lon(?:gitude)?=([-\d.]+)/i);
      if (m) return { lat: parseFloat(m[1]), lon: parseFloat(m[2]) };

      m = msg.match(/([-]?\d{1,3}\.\d{4,})[,\s]+([-]?\d{1,3}\.\d{4,})/);
      if (m) {
        const a = parseFloat(m[1]), b = parseFloat(m[2]);
        if (Math.abs(a) <= 90 && Math.abs(b) <= 180) return { lat: a, lon: b };
      }

      return null;
    }

    function parseTimestamp(msg) {
      const tsMatch = msg && msg.match(/(Mon|Tue|Wed|Thu|Fri|Sat|Sun).+\d{4}/);
      return tsMatch ? tsMatch[0] : new Date().toLocaleString();
    }

    function updateMap(lat, lon, timestamp) {
      const latlng = [lat, lon];
      if (marker) {
        marker.setLatLng(latlng);
      } else {
        marker = L.marker(latlng).addTo(map);
      }
      marker.bindPopup(`<b>Last ping:</b><br>${timestamp}<br>${lat.toFixed(5)}, ${lon.toFixed(5)}`).openPopup();
      map.setView(latlng, 15);
      document.getElementById('status').textContent = `📍 Updated: ${timestamp}`;
    }

    function handleMessage(raw) {
      debug(`Raw msg: ${raw.substring(0, 120)}`);
      const coords = parseCoordsFromMessage(raw);
      if (coords) {
        const ts = parseTimestamp(raw);
        updateMap(coords.lat, coords.lon, ts);
        debug(`Parsed: ${coords.lat}, ${coords.lon}`);
      } else {
        debug(`Could not parse coords from: ${raw.substring(0, 80)}`);
      }
    }

    async function loadLastPing() {
      try {
        const res = await fetch(`https://ntfy.sh/${NTFY_TOPIC}/json?poll=1&since=12h`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const lines = text.trim().split('\n').filter(Boolean);
        if (lines.length > 0) {
          const data = JSON.parse(lines[lines.length - 1]);
          const raw = data.message || data.title || "";
          handleMessage(raw);
        } else {
          document.getElementById('status').textContent = 'No recent pings found';
          debug('No messages in last 12h');
        }
      } catch (e) {
        console.error("History fetch error:", e);
        document.getElementById('status').textContent = 'Could not load history';
        debug(`History error: ${e.message}`);
      }
    }

    function connectSSE() {
      const url = `https://ntfy.sh/${NTFY_TOPIC}/sse`;
      debug(`SSE connecting to ${url}`);
      const es = new EventSource(url);

      es.onopen = () => debug('SSE connected, waiting for pings...');

      es.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          const raw = data.message || data.title || "";
          if (raw) handleMessage(raw);
        } catch (e) {
          console.error("SSE parse error:", e);
        }
      };

      es.onerror = () => {
        document.getElementById('status').textContent = '⚠️ Reconnecting...';
        debug('SSE error — reconnecting in 5s');
        es.close();
        setTimeout(connectSSE, 5000);
      };
    }

    loadLastPing().then(() => connectSSE());
  </script>
</body>
</html>
